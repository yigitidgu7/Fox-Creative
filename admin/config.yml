backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: tr

collections:
  - name: "projects"
    label: "Projeler"
    files:
      - label: "Proje Listesi"
        name: "projects"
        file: "data/projects.json"
        format: json
        fields:
          - label: "Projeler"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Proje Adı"
                name: "title"
                widget: "string"
                hint: "Örn: Sessiz Saat"
              - label: "Kategori"
                name: "category"
                widget: "select"
                options:
                  - { label: "Video", value: "video" }
                  - { label: "Fotoğraf", value: "photo" }
                  - { label: "Marka Filmi", value: "brand" }
                  - { label: "Reklam", value: "ads" }
              - label: "Görsel"
                name: "image"
                widget: "image"
                required: false
                hint: "Projeye ait fotoğraf veya video küçük resmi"
              - label: "Director's Note"
                name: "note"
                widget: "text"
                hint: "Kısa, vurucu bir cümle. Örn: Işığın peşinde, hikâyenin merkezinde."
              - label: "Yükseklik (px)"
                name: "height"
                widget: "number"
                default: 280
                value_type: "int"
                min: 180
                max: 500
                hint: "Masonry grid'deki kart yüksekliği"

  - name: "settings"
    label: "Site Ayarları"
    files:
      - label: "Genel Ayarlar"
        name: "general"
        file: "data/settings.json"
        format: json
        fields:
          - label: "Slogan"
            name: "slogan"
            widget: "string"
            default: "Ekipman değil, vizyon."
          - label: "Kısa Açıklama (Hero)"
            name: "heroDesc"
            widget: "text"
            default: "Biz sadece video çekmiyoruz. Işığı yönetiyor, anı kurguluyoruz ve markanın ruhunu sinematik bir dille anlatıyoruz."
          - label: "Showreel URL (Vimeo veya YouTube)"
            name: "showreelUrl"
            widget: "string"
            required: false
          - label: "E-posta"
            name: "email"
            widget: "string"
            default: "merhaba@foxcreative.co"
          - label: "Telefon"
            name: "phone"
            widget: "string"
            default: "+90 500 123 45 67"
          - label: "Şehir"
            name: "city"
            widget: "string"
            default: "İstanbul, Türkiye"
          - label: "Instagram Linki"
            name: "instagram"
            widget: "string"
            required: false
          - label: "Vimeo Linki"
            name: "vimeo"
            widget: "string"
            required: false
