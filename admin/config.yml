backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: tr

collections:
  - name: "brands"
    label: "Klasörler"
    files:
      - label: "Klasör Listesi"
        name: "brands"
        file: "data/brands.json"
        format: json
        fields:
          - label: "Klasörler"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} ({{fields.type}})"
            fields:
              - {label: "Klasör Adı", name: "name", widget: "string", hint: "Örn: Nike, Zara, Marka A"}
              - label: "Tür"
                name: "type"
                widget: "select"
                options:
                  - {label: "Fotoğraf Klasörü", value: "photo"}
                  - {label: "Video Klasörü", value: "video"}
              - {label: "Kapak Görseli", name: "cover", widget: "image", required: false}
              - label: "İçerikler"
                name: "items"
                widget: "list"
                summary: "{{fields.caption}}"
                fields:
                  - {label: "Görsel / Video", name: "image", widget: "image"}
                  - {label: "Açıklama", name: "caption", widget: "string", required: false}

  - name: "settings"
    label: "Site Ayarları"
    files:
      - label: "Genel Ayarlar"
        name: "general"
        file: "data/settings.json"
        format: json
        fields:
          - {label: "Slogan", name: "slogan", widget: "string"}
          - {label: "Hero Açıklaması", name: "heroDesc", widget: "text"}
          - {label: "Showreel URL", name: "showreelUrl", widget: "string", required: false}
          - {label: "E-posta", name: "email", widget: "string"}
          - {label: "Telefon", name: "phone", widget: "string"}
          - {label: "Şehir", name: "city", widget: "string"}
          - {label: "Instagram", name: "instagram", widget: "string", required: false}
          - {label: "Vimeo", name: "vimeo", widget: "string", required: false}
          - {label: "Logo Görseli", name: - {label: "Hakkımızda Görseli", name: "aboutImage", widget: "image", required: false, hint: "Sol taraftaki büyük çerçevede görünecek fotoğraf"}
