backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: tr

collections:
  - name: "projects"
    label: "Projeler"
    files:
      - label: "Proje Listesi"
        name: "projects"
        file: "data/projects.json"
        format: json
        fields:
          - label: "Projeler"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "Proje Adı", name: "title", widget: "string"}
              - {label: "Kategori", name: "category", widget: "select", options: [{label: "Video", value: "video"},{label: "Fotoğraf", value: "photo"},{label: "Marka Filmi", value: "brand"},{label: "Reklam", value: "ads"}]}
              - {label: "Görsel / Video", name: "image", widget: "image", required: false}
              - {label: "Director's Note", name: "note", widget: "text"}
              - {label: "Yükseklik (px)", name: "height", widget: "number", default: 280, value_type: "int", min: 180, max: 500}

  - name: "settings"
    label: "Site Ayarları"
    files:
      - label: "Genel Ayarlar"
        name: "general"
        file: "data/settings.json"
        format: json
        fields:
          - {label: "Slogan", name: "slogan", widget: "string"}
          - {label: "Hero Açıklaması", name: "heroDesc", widget: "text"}
          - {label: "Showreel URL", name: "showreelUrl", widget: "string", required: false}
          - {label: "E-posta", name: "email", widget: "string"}
          - {label: "Telefon", name: "phone", widget: "string"}
          - {label: "Şehir", name: "city", widget: "string"}
          - {label: "Instagram", name: "instagram", widget: "string", required: false}
          - {label: "Vimeo", name: "vimeo", widget: "string", required: false}
          - {label: "Logo Görseli", name: "logoImage", widget: "image", required: false, hint: "PNG veya SVG. Şeffaf arka plan önerilir."}
